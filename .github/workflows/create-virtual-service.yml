name: Create Virtual Service from Jira Story

# ---------------------------------------------------------------------------
# Triggered manually with a Jira ticket number, or automatically on push
# when the commit message contains a Jira-style ticket ID (e.g. PROJ-123).
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      jira_ticket:
        description: 'Jira ticket number (e.g., PROJ-123)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — plan only, do not deploy the virtual service'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

# Minimal token permissions — read-only access to checkout the repository.
permissions:
  contents: read

concurrency:
  group: create-virtual-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-virtual-service:
    name: Read Jira Story → Create Virtual Service
    timeout-minutes: 20
    # -----------------------------------------------------------------------
    # IMPORTANT: this job must run on the self-hosted runner that has
    # Parasoft Virtualize (and its MCP Server) running locally.
    # Register your runner under Settings → Actions → Runners and replace
    # the label below with any additional labels you assigned to it.
    # -----------------------------------------------------------------------
    runs-on: [self-hosted, Linux]

    steps:
      # -----------------------------------------------------------------------
      # Resolve the Jira ticket — from workflow_dispatch input, or by
      # extracting a Jira-style key (e.g. PROJ-123) from the commit message.
      # The step exits early (skipping the rest of the job) if no ticket is
      # found on a push event.
      # -----------------------------------------------------------------------
      - name: Resolve Jira ticket
        id: resolve_ticket
        shell: bash
        run: |
          set -euo pipefail
          ticket="${{ inputs.jira_ticket }}"
          if [ -z "${ticket:-}" ]; then
            commit_msg="${{ github.event.head_commit.message }}"
            if [[ "$commit_msg" =~ [A-Z]{2,10}-[0-9]+ ]]; then
              ticket="${BASH_REMATCH[0]}"
            else
              ticket=""
            fi
          fi
          if [ -z "${ticket:-}" ]; then
            echo "No Jira ticket found in commit message - skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Resolved ticket: $ticket"
            echo "ticket=$ticket" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.resolve_ticket.outputs.skip != 'true'
        uses: actions/checkout@v5

      - name: Check Copilot CLI availability
        id: copilot_cli
        if: steps.resolve_ticket.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if command -v copilot >/dev/null 2>&1; then
            echo "Copilot CLI already available: $(copilot --version | head -n 1)"
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Copilot CLI not found on runner."
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # Install GitHub Copilot CLI
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        if: steps.resolve_ticket.outputs.skip != 'true' && steps.copilot_cli.outputs.installed != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install Copilot CLI
        if: steps.resolve_ticket.outputs.skip != 'true' && steps.copilot_cli.outputs.installed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm install -g --no-audit --no-fund @github/copilot

      # -----------------------------------------------------------------------
      # Write the MCP server configuration for Copilot CLI.
      # Copilot CLI reads MCP servers from ~/.copilot/mcp-config.json.
      # Both secrets are pre-computed base64(user:token) strings.
      # -----------------------------------------------------------------------
      - name: Configure MCP servers
        if: steps.resolve_ticket.outputs.skip != 'true'
        shell: bash
        env:
          ATLASSIAN_BASIC_AUTH: ${{ secrets.ATLASSIAN_BASIC_AUTH }}
          VIRTUALIZE_AUTH_TOKEN: ${{ secrets.VIRTUALIZE_AUTH_TOKEN }}
          VIRTUALIZE_MCP_URL: ${{ secrets.VIRTUALIZE_MCP_URL }}
        run: |
          set -euo pipefail
          config_dir="$HOME/.copilot"
          mkdir -p "$config_dir"
          cat > "$config_dir/mcp-config.json" <<EOF
          {
            "mcpServers": {
              "jira-remote": {
                "type": "http",
                "url": "https://mcp.atlassian.com/v1/mcp",
                "headers": {
                  "Authorization": "Basic ${ATLASSIAN_BASIC_AUTH}"
                },
                "env": {
                  "ATLASSIAN_BASE_URL": "https://parasoft-demo.atlassian.net"
                }
              },
              "virtualize": {
                "type": "http",
                "url": "${VIRTUALIZE_MCP_URL}",
                "headers": {
                  "Authorization": "Basic ${VIRTUALIZE_AUTH_TOKEN}"
                }
              }
            }
          }
          EOF

      - name: Preflight MCP connectivity
        if: steps.resolve_ticket.outputs.skip != 'true'
        shell: bash
        env:
          VIRTUALIZE_MCP_URL: ${{ secrets.VIRTUALIZE_MCP_URL }}
        run: |
          set -euo pipefail
          check_url() {
            local name="$1"
            local url="$2"
            local code
            code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 12 "$url" || true)"
            if [ "$code" = "000" ]; then
              echo "FAIL: $name is unreachable: $url"
              exit 1
            fi
            echo "OK: $name reachable (HTTP $code): $url"
          }

          check_url "Atlassian MCP" "https://mcp.atlassian.com/v1/mcp"
          check_url "Virtualize MCP" "$VIRTUALIZE_MCP_URL"

      # -----------------------------------------------------------------------
      # Agent step 1: Read the Jira story, create and deploy the virtual
      # service via Virtualize MCP, and emit FULL_TEST_URL so the verification
      # step knows where the service is listening.
      # -----------------------------------------------------------------------
      - name: Run Copilot Agent - Create Virtual Service from Jira Story
        id: create_vs
        if: steps.resolve_ticket.outputs.skip != 'true'
        timeout-minutes: 12
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        shell: bash
        run: |
          set -euo pipefail
          ticket="${{ steps.resolve_ticket.outputs.ticket }}"
          dry_run="${{ inputs.dry_run }}"
          if [ -z "${dry_run:-}" ]; then
            dry_run="false"
          fi
          prompt=$(cat <<'EOF'
          Jira ticket: __TICKET__. Dry run: __DRY_RUN__.

          You are an expert DevOps automation engineer with deep knowledge of both
          Atlassian Jira and Parasoft Virtualize.

          IMPORTANT:
          You must always use the following when calling jira-remote tools:
            - cloudId: parasoft-demo.atlassian.net
          Never attempt to derive or guess the cloudId from usernames, emails, or URLs.
          
          IMPORTANT:
          The Virtualize MCP tools for creating virtual services require a service name. If a 
          high confidence name cannot be inferred from the Jira story, use the Jira ticket number
          as a reasonable default. If that name is already in use on the Virtualize server,
          choose a unique name (e.g., by appending -1, -2, etc. to the virtual service name so that
          it is unique and will not conflict with existing virtual services).

          IMPORTANT:
          The Virtualize MCP tools for creating virtual services require a deployment port. If 
          a high confidence port number cannot be inferred from the Jira story, use 38000 as
          a reasonable default starting point. List existing services on the Virtualize server, collect 
          currently occupied ports, and then choose the first free port starting from 38000 
          (or starting from the port inferred from the Jira story). Do not re-use ports that are
          already in use by other virtual services on the Virtualize server.

          IMPORTANT:
          The Virtualize MCP tools for creating virtual services require a deployment parameter.
          Use this exact deployment parameter value: VirtualizeMCPDemo.
          Do not append numeric suffixes to this deployment value (do not use values like
          VirtualizeMCPDemo-1 or VirtualizeMCPDemo-2). If uniqueness is needed, make the
          service name unique and/or choose a different free port, but keep deployment as
          VirtualizeMCPDemo.

          Your task:
          1. Use the jira-remote MCP tools to read the Jira user story for the ticket above.
          2. Analyze the story to extract all virtual service requirements: endpoint path,
             HTTP method(s), request/response schema, port, and any behavior rules.
          3. Use the virtualize MCP tools to create and deploy a virtual service that
             satisfies the requirements found in the story.
             - After deployment, use virtualize list/describe output to get the deployed base
               path that the server actually reports for the service, and use that base path
               when constructing FULL_TEST_URL. Never guess or synthesize deployment prefixes.
             - If creating multiple request-response interactions, download the files after
               the initial virtual asset creation and follow the readme to enrich the virtual 
               service with the additional interactions. 
             - For request correlation: The HTTP method, URL path, and URL query parameters 
               from the first line will be considered for correlation. The request body specified 
               after the headers will also be considered. Headers specified in the file are not 
               used for correlation.  
             - For path matching, an incoming request can have any number of additional URL path 
               segments prepended, but the last path segments must match those specified in the 
               request file. In the event that multiple matches are found, the one with the most 
               matching segments is selected. If multiple files are found with the same number of 
               matching segments, the one whose filename comes first alphabetically is used.
             - Wildcard matches are supported on the following parts of the request (exact matches 
               will be preferred over wildcard matches):
                - URL path: Use * or {parameterName} in a path segment to match any value in it to 
                  the incoming request. Note that the actual text in parameterName doesn't matter, 
                  so you can use anything that helps you identify the parameter.
                - URL query parameter: Use {*} as the query string (for example, 
                  POST /parabank/services/bank/billpay?{*}) to match any query value to the incoming 
                  request.
                - Payload: Use {*} as the entire payload to match any payload to the incoming request.
                - There is no regular expression support, you can either wildcard as described here, 
                  or create separate request/response file pairs for exact match interactions.
               - Include a catch-all `200` response for requests whose values deviate from any example
                 data found in the Jira story.
          5. Report a concise summary of what was created (service name, endpoint, port).
          6. At the very end of your response output these lines in this exact format:
             TEST_METHOD=POST
             FULL_TEST_URL=http://hostname:port/deployment/full/path?param=value
             Where:
             - TEST_METHOD is the HTTP method to use for a representative sanity test call.
             - FULL_TEST_URL is the complete URL for a representative sanity test call,
               including the deployment prefix, the full endpoint path, and representative
               query parameters from the Jira story. This must be a URL that the deployed
               virtual service will respond to with HTTP 200.
             - FULL_TEST_URL must use deployment prefix /VirtualizeMCPDemo.
             Omit all two lines if Dry run is true.

          Guidelines:
          - If information is missing from the Jira story, make reasonable defaults and
            note them in your final summary.
          - If Dry run is true, describe what you would create but do not call any
            Virtualize write or deploy tools.
          - Always confirm whether successful deployment occurred before finishing.
          EOF
          )
          prompt="${prompt/__TICKET__/$ticket}"
          prompt="${prompt/__DRY_RUN__/$dry_run}"

          output_file="$(mktemp)"
          start_ts="$(date +%s)"

          heartbeat() {
            while true; do
              elapsed=$(( $(date +%s) - start_ts ))
              echo "Copilot still running (${elapsed}s elapsed)..."
              sleep 30
            done
          }

          heartbeat &
          hb_pid=$!

          copilot_timeout_seconds=660
          echo "Starting Copilot (internal timeout: ${copilot_timeout_seconds}s)..."

          set +e
          if command -v timeout >/dev/null 2>&1; then
            timeout --signal=TERM "$copilot_timeout_seconds" copilot -p "$prompt" --yolo --no-ask-user 2>&1 | tee "$output_file"
            copilot_exit=${PIPESTATUS[0]}
          else
            copilot -p "$prompt" --yolo --no-ask-user 2>&1 | tee "$output_file"
            copilot_exit=${PIPESTATUS[0]}
          fi
          set -e

          kill "$hb_pid" 2>/dev/null || true
          wait "$hb_pid" 2>/dev/null || true

          end_ts="$(date +%s)"
          elapsed_total=$(( end_ts - start_ts ))
          echo "Copilot completed in ${elapsed_total}s (exit code: $copilot_exit)."

          if [ "$copilot_exit" -eq 124 ]; then
            echo "Copilot timed out after ${copilot_timeout_seconds}s."
            exit 124
          fi

          if [ "$copilot_exit" -ne 0 ]; then
            echo "Copilot CLI exited with code $copilot_exit. See output above for details."
            exit "$copilot_exit"
          fi

          test_method_line="$(grep -m1 '^TEST_METHOD=' "$output_file" || true)"
          full_test_url_line="$(grep -m1 '^FULL_TEST_URL=' "$output_file" || true)"

          if [ -z "$full_test_url_line" ]; then
            echo "No FULL_TEST_URL found in agent output - verification step will be skipped."
          fi
          if [ -n "$test_method_line" ]; then
            test_method="${test_method_line#TEST_METHOD=}"
            test_method="$(echo "$test_method" | xargs)"
            echo "Captured test method: $test_method"
            echo "test_method=$test_method" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$full_test_url_line" ]; then
            full_test_url="${full_test_url_line#FULL_TEST_URL=}"
            full_test_url="$(echo "$full_test_url" | xargs)"
            echo "Captured full test URL: $full_test_url"
            echo "full_test_url=$full_test_url" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "### Create Virtual Service Diagnostics"
            echo "- Copilot duration (seconds): ${elapsed_total}"
            echo "- Copilot exit code: ${copilot_exit}"
            if [ -n "$test_method_line" ]; then
              echo "- TEST_METHOD line: found"
            else
              echo "- TEST_METHOD line: not found"
            fi
            if [ -n "$full_test_url_line" ]; then
              echo "- FULL_TEST_URL line: found"
            else
              echo "- FULL_TEST_URL line: not found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          rm -f "$output_file"

      # -----------------------------------------------------------------------
      # Verification step: make the actual HTTP call and assert HTTP 200.
      # Uses the full test URL emitted by the create step — no separate
      # agent invocation needed.
      # -----------------------------------------------------------------------
      - name: Verify Virtual Service Returns HTTP 200
        if: steps.resolve_ticket.outputs.skip != 'true' && inputs.dry_run != 'true' && steps.create_vs.outputs.full_test_url != ''
        timeout-minutes: 2
        shell: bash
        run: |
          set -euo pipefail
          full_url="${{ steps.create_vs.outputs.full_test_url }}"
          test_method="${{ steps.create_vs.outputs.test_method }}"
          if [ -z "${test_method:-}" ]; then
            test_method='GET'
          fi
          echo "Sending $test_method $full_url"

          body_file="$(mktemp)"
          if ! status_code="$(curl -sS --connect-timeout 10 --max-time 30 -o "$body_file" -w '%{http_code}' -X "$test_method" "$full_url")"; then
            echo "FAIL: HTTP request failed."
            rm -f "$body_file"
            exit 1
          fi

          effective_url="$full_url"

          # If deployment path is wrong, SOAVirt returns 404 with "Enabled proxies".
          # Retry once by replacing the first URL path segment with the first active proxy path.
          if [ "$status_code" = '404' ] && grep -q 'Enabled proxies:' "$body_file"; then
            candidate_prefix="$(grep -E ':[[:space:]]+/[^[:space:]]+' "$body_file" | head -n1 | sed -E 's#^.*:[[:space:]]+(/[^[:space:]]+).*$#\1#')"
            if [ -n "${candidate_prefix:-}" ]; then
              origin="$(printf '%s' "$full_url" | sed -E 's#^(https?://[^/]+).*$#\1#')"
              path_qs="$(printf '%s' "$full_url" | sed -E 's#^https?://[^/]+##')"
              current_prefix="$(printf '%s' "$path_qs" | sed -E 's#^/([^/?]+).*$#/\1#')"
              suffix="${path_qs#${current_prefix}}"
              retry_url="${origin}${candidate_prefix}${suffix}"

              if [ "$retry_url" != "$full_url" ]; then
                echo "Path resolution fallback: retrying with enabled proxy path"
                echo "Retry URL: $retry_url"
                if ! status_code="$(curl -sS --connect-timeout 10 --max-time 30 -o "$body_file" -w '%{http_code}' -X "$test_method" "$retry_url")"; then
                  echo "FAIL: Retry HTTP request failed."
                  rm -f "$body_file"
                  exit 1
                fi
                effective_url="$retry_url"
              fi
            fi
          fi

          echo "Response status: $status_code"
          echo "Effective URL: $effective_url"
          if [ "$status_code" = '200' ]; then
            echo "PASS: Virtual service returned HTTP 200."
          else
            echo "FAIL: Expected 200 but received $status_code."
            echo "Response body:"
            cat "$body_file"
            rm -f "$body_file"
            exit 1
          fi
          rm -f "$body_file"
